services:
  langgraph:
    build:
      context: ./decepticon-slim/upstream
      dockerfile: containers/langgraph.Dockerfile
    container_name: hermes-decepticon-langgraph
    restart: unless-stopped
    command:
      - langgraph
      - dev
      - --host
      - 0.0.0.0
      - --port
      - "2024"
      - --no-browser
      - --n-jobs-per-worker
      - "10"
      - --allow-blocking
      - --no-reload
    ports:
      - "127.0.0.1:2024:2024"
    environment:
      DECEPTICON_LLM__PROXY_URL: http://9router:20128/v1
      SAAS_SANDBOX_URL: http://sandbox:9999
      DECEPTICON_NEO4J_URI: bolt://neo4j:7687
      DECEPTICON_NEO4J_USER: neo4j
      DECEPTICON_NEO4J_PASSWORD: ${NEO4J_PASSWORD:-decepticon}
      DECEPTICON_USE_SKILLOGY: "0"
    # NB: 9router lives in stack/docker-compose.yml (the base compose).
    # We don't depend_on:9router here so this overlay stays loadable
    # standalone (e.g. for `docker compose -f decepticon-slim.yml up`
    # in CI). install.sh always passes both -f files, and LangGraph is
    # an HTTP client with built-in retries — by the time it makes its
    # first call against http://9router:20128/v1, the base service is
    # already running on the shared hermes-net network.
    depends_on:
      neo4j:
        condition: service_started
      sandbox:
        condition: service_healthy
    networks:
      - hermes-net

  sandbox:
    build:
      context: ./decepticon-slim/upstream
      dockerfile: containers/sandbox.Dockerfile
    image: hermes-decepticon-sandbox:slim
    container_name: hermes-decepticon-sandbox
    restart: unless-stopped
    environment:
      SANDBOX_DAEMON: "1"
      SANDBOX_ROOT_DIR: /workspace
      SANDBOX_CONTAINER_NAME: hermes-decepticon-sandbox
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-decepticon}
    volumes:
      - ${HERMES_VAULT_PATH:-~/HermesVault}/Engagements:/workspace:rw
    healthcheck:
      test:
        - CMD
        - python3
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:9999/healthz')"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - hermes-net

  neo4j:
    image: neo4j:5.20
    container_name: hermes-decepticon-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-decepticon}
      NEO4J_server_memory_heap_max__size: 128M
    volumes:
      - neo4j_data:/data
    ports:
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7687:7687"
    networks:
      - hermes-net

volumes:
  neo4j_data:

networks:
  hermes-net:
    external: true
