[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/tmp/supervisord.pid
childlogdir=/var/log/supervisor

[program:xvfb]
command=/usr/bin/Xvfb :99 -screen 0 1920x1080x24 -ac +extension GLX +render -noreset
priority=10
autorestart=true
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
redirect_stderr=true

[program:openbox]
command=/usr/bin/openbox
priority=20
autorestart=true
environment=DISPLAY=":99"
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
redirect_stderr=true

[program:x11vnc]
command=/bin/sh -lc 'mkdir -p /tmp/vnc && if [ -n "${VNC_PASSWORD:-}" ]; then x11vnc -storepasswd "$VNC_PASSWORD" /tmp/vnc/passwd >/dev/null && exec x11vnc -display :99 -forever -shared -rfbauth /tmp/vnc/passwd; else exec x11vnc -display :99 -forever -shared -nopw; fi'
priority=30
autorestart=true
environment=DISPLAY=":99"
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
redirect_stderr=true

[program:novnc]
command=/usr/bin/websockify --web=/usr/share/novnc 6080 localhost:5900
priority=40
autorestart=true
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
redirect_stderr=true

[program:cdp-proxy]
command=/usr/bin/socat TCP-LISTEN:9222,fork,reuseaddr,bind=0.0.0.0 TCP:127.0.0.1:9223
priority=45
autorestart=true
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
redirect_stderr=true

[program:chromium]
command=/bin/sh -lc 'if [ -x /opt/vnc-cloak/chromium-launch.sh ]; then exec /opt/vnc-cloak/chromium-launch.sh; fi; until xdpyinfo -display :99 >/dev/null 2>&1; do sleep 0.25; done; exec chromium --no-sandbox --remote-debugging-port=9223 --remote-debugging-address=0.0.0.0 --user-data-dir=/profiles/${CLOAK_PROFILE:-default} --window-size=1920,1080 --start-maximized --disable-dev-shm-usage --disable-blink-features=AutomationControlled about:blank'
priority=50
autorestart=true
environment=DISPLAY=":99"
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
redirect_stderr=true
